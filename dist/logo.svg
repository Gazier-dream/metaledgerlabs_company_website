<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 86" fill="none">
  <defs>
    <linearGradient id="b1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BBEF5"/>
      <stop offset="100%" stop-color="#1460C8"/>
    </linearGradient>
    <linearGradient id="b2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1260B8"/>
      <stop offset="100%" stop-color="#0D3E90"/>
    </linearGradient>
    <linearGradient id="s1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#9AAAB8"/>
    </linearGradient>
    <linearGradient id="s2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4D0DC"/>
      <stop offset="100%" stop-color="#7A8A98"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8EE014"/>
      <stop offset="100%" stop-color="#247808"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60C00C"/>
      <stop offset="100%" stop-color="#165804"/>
    </linearGradient>
  </defs>

  <!-- Dark background hex -->
  <polygon points="50,2 95,27 95,61 50,86 5,61 5,27" fill="#07090E"/>

  <!-- BLUE: top-left face -->
  <polygon points="8,28  49,4   49,41  8,65"  fill="url(#b1)"/>
  <!-- BLUE: left depth edge -->
  <polygon points="5,27  8,28   8,65   5,61"  fill="url(#b2)"/>

  <!-- SILVER: top-right face -->
  <polygon points="51,4  92,28  92,52  51,38" fill="url(#s1)"/>
  <!-- SILVER: right depth edge -->
  <polygon points="92,28 95,27  95,61  92,52" fill="url(#s2)"/>

  <!-- GREEN: front-left face -->
  <polygon points="8,66  50,43  50,85  8,85"  fill="url(#g1)"/>
  <!-- GREEN: front-right face -->
  <polygon points="50,43 92,54  92,62  50,85" fill="url(#g2)"/>

  <!-- Gaps between pieces -->
  <polygon points="49,3  51,3  51,43  49,43"  fill="#05080D"/>
  <polygon points="50,42 5,62   5,65   50,45" fill="#05080D"/>
  <polygon points="50,42 95,26  95,29  50,45" fill="#05080D"/>
</svg>
